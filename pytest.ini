[tool:pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    --verbose
    --tb=short
    --cov=download_file
    --cov-report=term-missing
    --cov-report=html
    --cov-fail-under=80
markers =
    integration: marks tests as integration tests (may require network)
